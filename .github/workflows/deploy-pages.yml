name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build directory
        run: |
          mkdir -p _site

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='/config.js' \
            --exclude='/config.local.js' \
            --exclude='/config.local.example.js' \
            . _site/

          GH_TOKEN="${{ secrets.GH_MODELS_TOKEN }}"
          TEXT_PROVIDER="${{ vars.TEXT_PROVIDER }}"
          # Default to github if token present, otherwise pollinations
          if [ -z "$TEXT_PROVIDER" ]; then
            if [ -n "$GH_TOKEN" ]; then
              TEXT_PROVIDER="github"
            else
              TEXT_PROVIDER="pollinations"
            fi
          fi

          cat > _site/config.js <<EOF
          window.AI_VISUAL_NOVEL_CONFIG = {
              TEXT_PROVIDER: '${TEXT_PROVIDER}',
              IMAGE_PROVIDER: 'pollinations',
              POLLINATIONS_API_BASE_URL: 'https://text.pollinations.ai',
              POLLINATIONS_IMAGE_BASE_URL: 'https://image.pollinations.ai',
              POLLINATIONS_TEXT_MODEL: 'openai',
              POLLINATIONS_IMAGE_MODEL: 'flux',
              POLLINATIONS_API_KEY: '${{ secrets.POLLINATIONS_API_KEY }}',
              GITHUB_MODELS_BASE_URL: 'https://models.github.ai',
              GITHUB_TOKEN: '${GH_TOKEN}',
              GITHUB_MODEL: 'openai/gpt-4.1-mini',
              GITHUB_API_VERSION: '2026-03-10'
          };
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
